<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espresso Tracker</title>

  <!-- Google Fonts: DM Sans (body) + Fraunces (headings) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">

  <!-- DaisyUI — loaded first so Tailwind utility classes override component styles -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />

  <!-- Tailwind CSS CDN — injected after DaisyUI so utilities win on equal specificity -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* =====================================================================
       BASE
    ===================================================================== */
    :root { color-scheme: light; }
    [data-theme="night"] { color-scheme: dark; }

    body {
      font-family: 'DM Sans', sans-serif !important;
      background: #0f0f1a !important;
      color: #e2e0f0 !important;
    }

    h1, h2, h3 { font-family: 'Fraunces', serif; }

    /* =====================================================================
       STAT CARD
       JS does `timeCard.className = "stat-card"` to reset status colors,
       so every visual property for stat cards must live in this class —
       no Tailwind classes on those elements.
    ===================================================================== */
    .stat-card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 26px 16px;
      border: 2px solid #2a2550;
      text-align: center;
      transition: background-color 0.3s ease, border-color 0.3s ease,
                  box-shadow 0.3s ease, transform 0.25s ease;
    }
    .stat-card:hover {
      box-shadow: 0 0 32px rgba(124, 58, 237, 0.28);
      border-color: rgba(124, 58, 237, 0.45) !important;
      transform: translateY(-2px);
    }

    /* =====================================================================
       CARD GLOW — for static cards (form, feedback)
    ===================================================================== */
    .card-glow {
      transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.25s ease;
    }
    .card-glow:hover {
      box-shadow: 0 0 36px rgba(124, 58, 237, 0.22);
      border-color: rgba(124, 58, 237, 0.42) !important;
      transform: translateY(-2px);
    }

    /* =====================================================================
       ADD SHOT BUTTON
    ===================================================================== */
    .btn-add {
      width: 100%;
      margin-top: 0.5rem;
      padding: 13px;
      background: #7c3aed;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 22px rgba(124, 58, 237, 0.38);
      transition: background-color 0.2s ease, box-shadow 0.2s ease, transform 0.12s ease;
    }
    .btn-add:hover {
      background: #6d28d9;
      box-shadow: 0 6px 30px rgba(124, 58, 237, 0.54);
    }
    .btn-add:active { transform: scale(0.97); }

    /* =====================================================================
       RANGE SLIDER
    ===================================================================== */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #2a2550;
      outline: none;
      cursor: pointer;
      border: none;
      padding: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #7c3aed;
      border: 2px solid #1a1a2e;
      box-shadow: 0 0 10px rgba(124, 58, 237, 0.7);
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.15); }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #7c3aed;
      border: 2px solid #1a1a2e;
      cursor: pointer;
    }

    /* =====================================================================
       ANIMATIONS
    ===================================================================== */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =====================================================================
       STATUS THEMES — applied dynamically by JS
    ===================================================================== */
    .s-warning { background: #1f0f18 !important; border-color: #e53935 !important; }
    .s-warning .stat-card-value { color: #ff6b6b !important; }
    .s-warning .status-pill { background: #3a1520; color: #ff6b6b; }
    .s-warning .entry-stat-value { color: #ff6b6b; }

    .s-okay { background: #1f1a0a !important; border-color: #f39c12 !important; }
    .s-okay .stat-card-value { color: #f5c842 !important; }
    .s-okay .status-pill { background: #352a0f; color: #f5c842; }
    .s-okay .entry-stat-value { color: #f5c842; }

    .s-good { background: #0a1f12 !important; border-color: #27ae60 !important; }
    .s-good .stat-card-value { color: #4ade80 !important; }
    .s-good .status-pill { background: #0f3520; color: #4ade80; }
    .s-good .entry-stat-value { color: #4ade80; }

    .s-excellent { background: #130f2a !important; border-color: #7c3aed !important; }
    .s-excellent .stat-card-value { color: #a78bfa !important; }
    .s-excellent .status-pill { background: #201a45; color: #a78bfa; }
    .s-excellent .entry-stat-value { color: #a78bfa; }

    /* =====================================================================
       STATUS PILL — used in stat cards and feedback
    ===================================================================== */
    .status-pill {
      display: inline-block;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      background: #252045;
      color: #9b8ec4;
      transition: background-color 0.3s, color 0.3s;
    }

    /* =====================================================================
       JS-GENERATED ENTRY CARDS
       All class names here come from renderEntries() template literals.
    ===================================================================== */
    .entry-card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 14px;
      border: 1px solid #2a2550;
      animation: fadeInDown 0.7s ease;
      transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.25s ease;
    }
    .entry-card:hover {
      box-shadow: 0 0 28px rgba(124, 58, 237, 0.22);
      border-color: rgba(124, 58, 237, 0.38) !important;
      transform: translateY(-2px);
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .entry-bean-name {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e0f0;
    }

    .entry-meta {
      font-size: 0.78rem;
      color: #9b8ec4;
      margin-top: 3px;
    }

    .entry-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .entry-stat {
      background: #0f0f1a;
      border: 1px solid #2a2550;
      border-radius: 8px;
      padding: 9px 4px;
      text-align: center;
    }

    .entry-stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9b8ec4;
      margin-bottom: 3px;
    }

    .entry-stat-value {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e2e0f0;
    }

    .entry-stat.status-cell { background: #252045; }

    .entry-notes {
      font-size: 0.85rem;
      color: #b8aee8;
      font-style: italic;
      padding-top: 10px;
      border-top: 1px solid #2a2550;
      line-height: 1.5;
    }

    .delete-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      background: transparent;
      color: #9b8ec4;
      border: 1px solid #3d3570;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s, border-color 0.2s, transform 0.12s;
      white-space: nowrap;
    }
    .delete-btn:hover {
      background: rgba(255, 100, 130, 0.12);
      color: #ff9ab0;
      border-color: rgba(255, 100, 130, 0.4);
    }
    .delete-btn:active { transform: scale(0.93); }

    .empty-message {
      text-align: center;
      color: #7a6aaa;
      padding: 52px 0;
      font-size: 0.95rem;
    }

    /* =====================================================================
       JS-GENERATED FEEDBACK HTML
    ===================================================================== */
    .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; }

    .feedback-col-header {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9b8ec4;
      font-weight: 600;
      padding-bottom: 12px;
    }

    .feedback-cell { padding: 14px 16px 14px 0; border-top: 1px solid #2a2550; }
    .feedback-target { padding: 14px 0 14px 16px; border-top: 1px solid #2a2550; }

    .feedback-metric-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9b8ec4;
      margin-bottom: 5px;
    }

    .feedback-actual-value {
      font-size: 1rem;
      font-weight: 600;
      color: #e2e0f0;
      margin-right: 6px;
    }

    .feedback-target-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9b8ec4;
      margin-bottom: 5px;
    }

    .feedback-target-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #c4b5f4;
    }

    .feedback-suggestion {
      font-size: 0.8rem;
      color: #b8aee8;
      margin-top: 6px;
      line-height: 1.45;
      font-style: italic;
    }

    .feedback-perfect {
      text-align: center;
      padding: 14px 0;
      color: #4ade80;
      font-weight: 600;
      font-family: 'Fraunces', serif;
      font-size: 1.05rem;
    }

    /* =====================================================================
       TOP NAV BAR
    ===================================================================== */
    #top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 56px;
      background: #12122a;
      border-bottom: 1px solid #2a2550;
      display: flex;
      align-items: center;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 16px;
      width: 100%;
    }

    .nav-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 22px;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: #7a6aaa;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 0.2s ease, background-color 0.2s ease;
    }
    .nav-tab:hover {
      color: #c4b5f4;
      background: rgba(124, 58, 237, 0.1);
    }
    .nav-tab.active {
      color: #a78bfa;
      background: rgba(124, 58, 237, 0.15);
      font-weight: 600;
    }
    .nav-tab svg { flex-shrink: 0; }

    /* =====================================================================
       PAGE PLACEHOLDER
    ===================================================================== */
    .page-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
    }
    .page-placeholder h2 {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #7c3aed;
      letter-spacing: 0.02em;
    }

    /* =====================================================================
       CALENDAR
    ===================================================================== */
    .cal-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      background: transparent;
      color: #9b8ec4;
      border: 1px solid #3d3570;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s, border-color 0.2s;
    }
    .cal-nav-btn:hover {
      background: rgba(124, 58, 237, 0.12);
      color: #c4b5f4;
      border-color: rgba(124, 58, 237, 0.4);
    }

    .cal-weekday-header {
      text-align: center;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5a4a8a;
      padding-bottom: 10px;
    }

    .cal-day {
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      border: 1px solid #2a2550;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a3a7a;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .cal-day:not(.cal-empty):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .pending-date-banner {
      display: none;
      background: #f0dbc8;
      color: #4a2e14;
      border: 1px solid #d4b896;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .pending-date-banner button {
      background: none;
      border: none;
      cursor: pointer;
      color: #8b6347;
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .pending-date-banner button:hover { color: #4a2e14; }
    [data-theme="night"] .pending-date-banner {
      background: #252045;
      color: #c4b5f4;
      border-color: #3d3570;
    }
    [data-theme="night"] .pending-date-banner button { color: #9b8ec4; }
    [data-theme="night"] .pending-date-banner button:hover { color: #e2e0f0; }
    .cal-day.cal-empty  { background: transparent; border: none; }
    .cal-day.cal-today  { border-color: #4a3a8a !important; color: #c4b5f4 !important; }
    .cal-day.cal-has-brew {
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .cal-day.cal-has-brew:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .brew-warning   { background: #1f0f18 !important; border-color: #e53935 !important; color: #ff6b6b !important; }
    .brew-okay      { background: #1f1a0a !important; border-color: #f39c12 !important; color: #f5c842 !important; }
    .brew-good      { background: #0a1f12 !important; border-color: #27ae60 !important; color: #4ade80 !important; }
    .brew-excellent { background: #130f2a !important; border-color: #7c3aed !important; color: #a78bfa !important; }

    .cal-legend {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #2a2550;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.72rem;
      color: #9b8ec4;
      font-weight: 500;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid;
      flex-shrink: 0;
    }

    /* Calendar popup */
    #cal-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #cal-popup-box {
      background: #1a1a2e;
      border: 1px solid #2a2550;
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .cal-popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .cal-popup-title {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #c4b5f4;
    }
    .cal-close-btn {
      background: transparent;
      border: 1px solid #3d3570;
      color: #7a6aaa;
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      line-height: 1;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .cal-close-btn:hover { color: #c4b5f4; border-color: #6a5aaa; }

    /* =====================================================================
       THEME TOGGLE BUTTON
    ===================================================================== */
    #theme-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      color: #7a6aaa;
      padding: 6px 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: color 0.2s ease, background-color 0.2s ease;
    }
    #theme-toggle:hover {
      color: #c4b5f4;
      background: rgba(124, 58, 237, 0.1);
    }

    /* =====================================================================
       LIGHT MODE — warm coffee palette
    ===================================================================== */
    [data-theme="light"] { color-scheme: light; }

    [data-theme="light"] body {
      background: #faf6f0 !important;
      color: #2c1a0e !important;
    }

    [data-theme="light"] header {
      background: linear-gradient(135deg, #faf6f0 0%, #f0dbc8 45%, #d4a96a 100%) !important;
    }
    /* dot-grid overlay — dark espresso brown dots */
    [data-theme="light"] header > div:nth-child(1) {
      background-image: radial-gradient(circle, rgba(80,45,15,0.22) 1px, transparent 1px) !important;
    }
    /* radial glow overlay — deep brown glow */
    [data-theme="light"] header > div:nth-child(2) {
      background: radial-gradient(ellipse, rgba(111,60,20,0.32) 0%, transparent 68%) !important;
    }
    [data-theme="light"] header h1 {
      color: #2c1a0e !important;
      text-shadow: 0 2px 24px rgba(111,78,55,0.25) !important;
    }
    [data-theme="light"] header p { color: #6f4e37 !important; }

    /* Nav */
    [data-theme="light"] #top-nav { background: #ffffff !important; border-bottom-color: #e8d5c0 !important; }
    [data-theme="light"] .nav-tab { color: #a07850 !important; }
    [data-theme="light"] .nav-tab:hover { color: #4a2e14 !important; background: rgba(111,78,55,0.08) !important; }
    [data-theme="light"] .nav-tab.active { color: #6f4e37 !important; background: rgba(111,78,55,0.12) !important; }
    [data-theme="light"] #theme-toggle { color: #a07850 !important; }
    [data-theme="light"] #theme-toggle:hover { color: #4a2e14 !important; background: rgba(111,78,55,0.08) !important; }

    /* Add button */
    [data-theme="light"] .btn-add { background: #6f4e37 !important; box-shadow: 0 4px 22px rgba(111,78,55,0.35) !important; }
    [data-theme="light"] .btn-add:hover { background: #5a3d2a !important; box-shadow: 0 6px 30px rgba(111,78,55,0.5) !important; }

    /* Stat cards */
    [data-theme="light"] .stat-card { background: #ffffff !important; border-color: #e8d5c0 !important; }
    [data-theme="light"] .stat-card:hover { box-shadow: 0 0 32px rgba(111,78,55,0.2) !important; border-color: rgba(111,78,55,0.38) !important; }
    [data-theme="light"] .card-glow:hover { box-shadow: 0 0 36px rgba(111,78,55,0.16) !important; border-color: rgba(111,78,55,0.32) !important; }

    /* Status themes */
    [data-theme="light"] .s-warning  { background: #fff0f0 !important; border-color: #e53935 !important; }
    [data-theme="light"] .s-warning  .stat-card-value { color: #c0181a !important; }
    [data-theme="light"] .s-warning  .status-pill     { background: #ffe4e4 !important; color: #c0181a !important; }
    [data-theme="light"] .s-warning  .entry-stat-value{ color: #c0181a !important; }

    [data-theme="light"] .s-okay     { background: #fffae8 !important; border-color: #f39c12 !important; }
    [data-theme="light"] .s-okay     .stat-card-value { color: #a06800 !important; }
    [data-theme="light"] .s-okay     .status-pill     { background: #fff0c0 !important; color: #a06800 !important; }
    [data-theme="light"] .s-okay     .entry-stat-value{ color: #a06800 !important; }

    [data-theme="light"] .s-good     { background: #f0fff5 !important; border-color: #27ae60 !important; }
    [data-theme="light"] .s-good     .stat-card-value { color: #18763c !important; }
    [data-theme="light"] .s-good     .status-pill     { background: #d0ffe4 !important; color: #18763c !important; }
    [data-theme="light"] .s-good     .entry-stat-value{ color: #18763c !important; }

    [data-theme="light"] .s-excellent{ background: #fff5ec !important; border-color: #6f4e37 !important; }
    [data-theme="light"] .s-excellent .stat-card-value { color: #4a2e14 !important; }
    [data-theme="light"] .s-excellent .status-pill     { background: #f0dbc8 !important; color: #4a2e14 !important; }
    [data-theme="light"] .s-excellent .entry-stat-value{ color: #4a2e14 !important; }

    /* Input focus */

    [data-theme="light"] textarea:focus {
      border-color: #6f4e37 !important;
      --tw-ring-color: rgba(111, 78, 55, 0.2) !important;

    [data-theme="light"] .entry-meta      { color: #8b6347 !important; }

    [data-theme="light"] .entry-stat-value { color: #2c1a0e !important; }
    [data-theme="light"] .entry-notes     { color: #5a3d2a !important; border-top-color: #e8d5c0 !important; }
    [data-theme="light"] .delete-btn      { color: #8b6347 !important; border-color: #d4b896 !important; }

    /* Feedback */
    [data-theme="light"] .feedback-col-header  { color: #8b6347 !important; }
    [data-theme="light"] .feedback-metric-label{ color: #8b6347 !important; }
    [data-theme="light"] .feedback-actual-value{ color: #2c1a0e !important; }
    [data-theme="light"] .feedback-target-label{ color: #8b6347 !important; }
    [data-theme="light"] .feedback-target-value{ color: #4a2e14 !important; }
    [data-theme="light"] .feedback-suggestion  { color: #5a3d2a !important; }

    [data-theme="light"] .feedback-target{ border-top-color: #e8d5c0 !important; }

    /* Slider */
    [data-theme="light"] input[type="range"] { background: #e8d5c0 !important; }
    [data-theme="light"] input[type="range"]::-webkit-slider-thumb { background: #6f4e37 !important; border-color: #faf6f0 !important; box-shadow: 0 0 10px rgba(111,78,55,0.5) !important; }
    [data-theme="light"] input[type="range"]::-moz-range-thumb { background: #6f4e37 !important; border-color: #faf6f0 !important; }

    /* Calendar */
    [data-theme="light"] #cal-month-label    { color: #4a2e14 !important; }
    [data-theme="light"] .cal-weekday-header { color: #a07850 !important; }

    [data-theme="light"] .cal-day.cal-today  { border-color: #8b6347 !important; color: #4a2e14 !important; }
    [data-theme="light"] .cal-nav-btn        { color: #8b6347 !important; border-color: #d4b896 !important; }
    [data-theme="light"] .cal-nav-btn:hover  { color: #4a2e14 !important; background: rgba(111,78,55,0.08) !important; border-color: rgba(111,78,55,0.4) !important; }
    [data-theme="light"] .brew-warning   { background: #fff0f0 !important; border-color: #e53935 !important; color: #c0181a !important; }
    [data-theme="light"] .brew-okay      { background: #fffae8 !important; border-color: #f39c12 !important; color: #a06800 !important; }
    [data-theme="light"] .brew-good      { background: #f0fff5 !important; border-color: #27ae60 !important; color: #18763c !important; }
    [data-theme="light"] .brew-excellent { background: #fff5ec !important; border-color: #6f4e37 !important; color: #4a2e14 !important; }
    [data-theme="light"] .cal-legend     { border-top-color: #e8d5c0 !important; }
    [data-theme="light"] .legend-item    { color: #8b6347 !important; }

    /* History / Level page accents */
    [data-theme="light"] #entry-count           { background: #6f4e37 !important; }
    [data-theme="light"] .page-placeholder h2   { color: #6f4e37 !important; }

    /* =====================================================================
       LEVEL PAGE
    ===================================================================== */
    .rank-card {
      background: #1a1a2e;
      border: 2px solid #2a2550;
      border-radius: 20px;
      padding: 28px 24px 22px;
      margin-bottom: 20px;
      text-align: center;
    }
    .rank-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9b8ec4;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .rank-name {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 4px;
    }
    .rank-xp-label {
      font-size: 0.8rem;
      color: #9b8ec4;
      margin-bottom: 10px;
    }
    .xp-bar-track {
      height: 10px;
      border-radius: 5px;
      background: #2a2550;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .xp-bar-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(to right, #7c3aed, #a78bfa);
      transition: width 0.8s ease;
    }
    .rank-next-label { font-size: 0.72rem; color: #7a6aaa; }

    .badges-section-title {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #c4b5f4;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badges-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .badge-card {
      background: #1a1a2e;
      border: 1px solid #2a2550;
      border-radius: 14px;
      padding: 16px 10px 14px;
      text-align: center;
      transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
    }
    .badge-card.badge-unlocked {
      border-color: #7c3aed;
      box-shadow: 0 0 16px rgba(124,58,237,0.2);
    }
    .badge-card.badge-unlocked:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(124,58,237,0.34);
    }
    .badge-card.badge-locked { opacity: 0.35; }
    .badge-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 9px;
      color: #4a3a7a;
    }
    .badge-card.badge-unlocked .badge-icon { color: #a78bfa; }
    .badge-name {
      font-size: 0.72rem;
      font-weight: 600;
      color: #e2e0f0;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .badge-desc { font-size: 0.6rem; color: #9b8ec4; line-height: 1.4; }

    /* Light mode */
    [data-theme="light"] .rank-card    { background: #ffffff; border-color: #e8d5c0; }
    [data-theme="light"] .rank-title   { color: #8b6347; }
    [data-theme="light"] .rank-name    { color: #4a2e14; }
    [data-theme="light"] .rank-xp-label{ color: #8b6347; }
    [data-theme="light"] .xp-bar-track { background: #e8d5c0; }
    [data-theme="light"] .xp-bar-fill  { background: linear-gradient(to right, #6f4e37, #c8905a); }
    [data-theme="light"] .rank-next-label { color: #a07850; }
    [data-theme="light"] .badges-section-title { color: #4a2e14; }
    [data-theme="light"] .badge-card   { background: #ffffff; border-color: #e8d5c0; }
    [data-theme="light"] .badge-card.badge-unlocked { border-color: #6f4e37; box-shadow: 0 0 16px rgba(111,78,55,0.18); }
    [data-theme="light"] .badge-card.badge-unlocked:hover { box-shadow: 0 0 24px rgba(111,78,55,0.3); }
    [data-theme="light"] .badge-icon              { color: #c8a882; }
    [data-theme="light"] .badge-card.badge-unlocked .badge-icon { color: #6f4e37; }
    [data-theme="light"] .badge-name   { color: #2c1a0e; }
    [data-theme="light"] .badge-desc   { color: #8b6347; }

    /* =====================================================================
       DELETE CONFIRM MODAL
    ===================================================================== */
    #confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #confirm-box {
      background: #1a1a2e;
      border: 1px solid #2a2550;
      border-radius: 20px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 340px;
    }
    #confirm-box h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #c4b5f4;
      margin: 0 0 8px;
    }
    #confirm-box p {
      font-size: 0.85rem;
      color: #9b8ec4;
      margin: 0 0 24px;
      line-height: 1.5;
    }
    #confirm-delete-btn {
      display: inline-flex;
      align-items: center;
      padding: 7px 18px;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #confirm-delete-btn:hover { background: #c62828; }

    [data-theme="light"] #confirm-overlay { background: rgba(60,35,15,0.4) !important; }
    [data-theme="light"] #confirm-box     { background: #ffffff !important; border-color: #e8d5c0 !important; }
    [data-theme="light"] #confirm-box h3  { color: #4a2e14 !important; }
    [data-theme="light"] #confirm-box p   { color: #8b6347 !important; }
  </style>
</head>

<body class="bg-[#0f0f1a] text-[#e2e0f0] min-h-screen pt-14">

  <!-- ===================================================================
       TOP NAV BAR
  =================================================================== -->
  <nav id="top-nav">
    <div class="nav-inner">
      <button class="nav-tab active" data-page="home">
        <i data-lucide="house" style="width:16px;height:16px;"></i>
        Home
      </button>
      <button class="nav-tab" data-page="calendar">
        <i data-lucide="calendar" style="width:16px;height:16px;"></i>

      </button>

  <!-- ===================================================================
       PAGE: HOME
  =================================================================== -->
  <div id="page-home" class="page-content">

  <!-- ===================================================================
       HEADER
  =================================================================== -->
  <header class="relative overflow-hidden text-center py-14 px-5 mb-10"
    style="background: linear-gradient(135deg, #0f0f1a 0%, #190f38 45%, #2e1065 100%);">
    <!-- dot-grid texture -->
    <div class="absolute inset-0 pointer-events-none"
      style="background-image: radial-gradient(circle, rgba(167,139,250,0.18) 1px, transparent 1px); background-size: 26px 26px;"></div>
    <!-- soft radial glow at top-center -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-48 pointer-events-none"
      style="background: radial-gradient(ellipse, rgba(124,58,237,0.32) 0%, transparent 68%);"></div>
    <div class="relative z-10">
      <h1 class="text-[2.75rem] md:text-5xl font-bold text-white mb-3 tracking-tight"
        style="text-shadow: 0 2px 24px rgba(124,58,237,0.45);">

      </h1>
      <p class="text-xs text-[#a78bfa] tracking-[0.2em] uppercase font-medium">
        Dial in your perfect shot
      </p>
    </div>
  </header>


  <!-- ===================================================================
       MAIN CONTAINER
  =================================================================== -->
  <div class="max-w-[720px] mx-auto px-4 pb-20">

    <!-- LOG A SHOT CARD ================================================ -->
    <div class="bg-[#1a1a2e] rounded-2xl p-7 mb-6 border border-[#2a2550] card-glow">
      <h2 class="text-xl font-semibold text-[#c4b5f4] mb-6 flex items-center gap-2.5">
        <i data-lucide="plus-circle" class="w-5 h-5 text-[#7c3aed]"></i>
        Log a Shot
      </h2>

      <div class="grid grid-cols-2 gap-4">

        <!-- Bean Name — full width -->
        <div class="col-span-2">
          <label for="bean-name"
            class="block text-[0.7rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-1.5">
            Bean Name
          </label>
          <input type="text" id="bean-name" placeholder="e.g. Ethiopia Yirgacheffe" maxlength="80"
            class="w-full px-3.5 py-2.5 text-sm rounded-xl bg-[#0d0d1a] border border-[#3d3570] text-[#e2e0f0] placeholder-[#4a4070] focus:outline-none focus:border-[#7c3aed] focus:ring-2 focus:ring-[#7c3aed]/20 transition-all duration-200" />
        </div>

        <!-- Roast Date — full width -->
        <div class="col-span-2">
          <label for="roast-date"
            class="block text-[0.7rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-1.5">
            Roast Date
            <span class="normal-case font-normal text-[#5a4a7a] tracking-normal ml-1 text-xs">(optional)</span>
          </label>
          <input type="date" id="roast-date"
            class="w-full px-3.5 py-2.5 text-sm rounded-xl bg-[#0d0d1a] border border-[#3d3570] text-[#e2e0f0] focus:outline-none focus:border-[#7c3aed] focus:ring-2 focus:ring-[#7c3aed]/20 transition-all duration-200" />
        </div>

        <!-- Grind Size -->
        <div>
          <label for="grind-size"
            class="block text-[0.7rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-1.5">
            Grind Size (clicks)
          </label>
          <input type="number" id="grind-size" placeholder="e.g. 14" min="0" max="100"
            class="w-full px-3.5 py-2.5 text-sm rounded-xl bg-[#0d0d1a] border border-[#3d3570] text-[#e2e0f0] placeholder-[#4a4070] focus:outline-none focus:border-[#7c3aed] focus:ring-2 focus:ring-[#7c3aed]/20 transition-all duration-200" />
        </div>

        <!-- Dose -->
        <div>
          <label for="dose"
            class="block text-[0.7rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-1.5">
            Dose (g)
          </label>
          <input type="number" id="dose" placeholder="e.g. 18.0" min="0" max="99" step="0.1"
            class="w-full px-3.5 py-2.5 text-sm rounded-xl bg-[#0d0d1a] border border-[#3d3570] text-[#e2e0f0] placeholder-[#4a4070] focus:outline-none focus:border-[#7c3aed] focus:ring-2 focus:ring-[#7c3aed]/20 transition-all duration-200" />
        </div>

        <!-- Yield -->
        <div>
          <label for="yield-g"
            class="block text-[0.7rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-1.5">
            Yield (g)
          </label>
          <input type="number" id="yield-g" placeholder="e.g. 36.0" min="0" max="200" step="0.1"
            class="w-full px-3.5 py-2.5 text-sm rounded-xl bg-[#0d0d1a] border border-[#3d3570] text-[#e2e0f0] placeholder-[#4a4070] focus:outline-none focus:border-[#7c3aed] focus:ring-2 focus:ring-[#7c3aed]/20 transition-all duration-200" />
        </div>

        <!-- Brew Time -->
        <div>
          <label for="brew-time"
            class="block text-[0.7rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-1.5">
            Brew Time (s)
          </label>
          <input type="number" id="brew-time" placeholder="e.g. 28" min="0" max="120"
            class="w-full px-3.5 py-2.5 text-sm rounded-xl bg-[#0d0d1a] border border-[#3d3570] text-[#e2e0f0] placeholder-[#4a4070] focus:outline-none focus:border-[#7c3aed] focus:ring-2 focus:ring-[#7c3aed]/20 transition-all duration-200" />
        </div>

        <!-- Taste Score Slider — full width -->
        <div class="col-span-2">
          <label for="taste-score"
            class="block text-[0.7rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-1.5">
            Taste Score
          </label>
          <div class="flex items-center gap-3">
            <span class="text-sm text-[#9b8ec4] min-w-[14px] text-center">1</span>
            <input type="range" id="taste-score" min="1" max="10" value="5" step="1" />
            <span class="text-sm text-[#9b8ec4] min-w-[14px] text-center">10</span>
            <span class="min-w-[52px] text-center text-base font-bold text-[#c4b5f4]">
              <span id="score-display">5</span>/10
            </span>
          </div>
        </div>

        <!-- Notes — full width -->
        <div class="col-span-2">
          <label for="notes"
            class="block text-[0.7rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-1.5">

          </label>
          <textarea id="notes" placeholder="Tasting notes, what to adjust next time…"

        </div>

      </div><!-- end form grid -->

      <div class="pending-date-banner" id="pending-date-banner" style="display:none">

      <p class="text-[#ff6b8a] text-sm mt-3 min-h-[20px]" id="error-msg"></p>

      <button id="add-btn" class="btn-add">
        <i data-lucide="plus" class="w-4 h-4"></i>
        Add Shot
      </button>
    </div><!-- end form card -->


    <!-- STATS ROW ======================================================= -->
    <div class="grid grid-cols-2 gap-4 mb-6">

        Last Shot Feedback
      </h2>
      <div id="feedback-content"></div>
    </div>


  </div><!-- end container -->

  </div><!-- end page-home -->


  <!-- ===================================================================
       PAGE: CALENDAR
  =================================================================== -->
  <div id="page-calendar" class="page-content" style="display:none">
    <div class="max-w-[720px] mx-auto px-4 pb-20 pt-8">

      <!-- Month navigation -->
      <div class="flex items-center justify-between mb-6">
        <button id="cal-prev" class="cal-nav-btn">
          <i data-lucide="chevron-left" style="width:15px;height:15px;"></i>
          Prev
        </button>
        <h2 id="cal-month-label"
          style="font-family:'Fraunces',serif; font-size:1.25rem; font-weight:600; color:#c4b5f4;"></h2>
        <button id="cal-next" class="cal-nav-btn">
          Next
          <i data-lucide="chevron-right" style="width:15px;height:15px;"></i>
        </button>
      </div>

      <!-- Weekday headers -->
      <div class="grid grid-cols-7 mb-1">
        <div class="cal-weekday-header">Sun</div>
        <div class="cal-weekday-header">Mon</div>
        <div class="cal-weekday-header">Tue</div>
        <div class="cal-weekday-header">Wed</div>
        <div class="cal-weekday-header">Thu</div>
        <div class="cal-weekday-header">Fri</div>
        <div class="cal-weekday-header">Sat</div>
      </div>

      <!-- Day grid (JS-rendered) -->
      <div id="cal-grid" class="grid grid-cols-7 gap-1.5"></div>

      <!-- Legend -->
      <div class="cal-legend">
        <div class="legend-item">
          <div class="legend-swatch" style="background:#1f0f18; border-color:#e53935;"></div>
          Warning
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#1f1a0a; border-color:#f39c12;"></div>
          Okay
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#0a1f12; border-color:#27ae60;"></div>
          Good
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:#130f2a; border-color:#7c3aed;"></div>
          Excellent
        </div>
        <button id="cal-today" class="cal-nav-btn" style="margin-left:auto;">
          <i data-lucide="calendar-check" style="width:14px;height:14px;"></i>
          Today
        </button>
      </div>

    </div>

    <!-- Day detail popup -->
    <div id="cal-popup-overlay" style="display:none">
      <div id="cal-popup-box">
        <div class="cal-popup-header">
          <div class="cal-popup-title" id="cal-popup-title"></div>
          <button class="cal-close-btn" id="cal-popup-close">×</button>
        </div>
        <div id="cal-popup-entries"></div>
      </div>
    </div>
  </div>


  <!-- ===================================================================
       PAGE: HISTORY
  =================================================================== -->
  <div id="page-history" class="page-content" style="display:none">
    <div class="max-w-[720px] mx-auto px-4 pb-20 pt-8">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold text-[#c4b5f4] flex items-center gap-2.5">
          <i data-lucide="scroll" class="w-5 h-5 text-[#7c3aed]"></i>
          Shot Log
        </h2>
        <span class="badge border-0 text-white text-xs font-bold"
          style="background: #7c3aed; padding: 0 12px; height: 24px; border-radius: 20px;" id="entry-count">0</span>
      </div>
      <ul id="entry-list"></ul>
    </div>
  </div>


  <!-- ===================================================================
       PAGE: LEVEL
  =================================================================== -->
  <div id="page-level" class="page-content" style="display:none">
    <div class="max-w-[720px] mx-auto px-4 pb-20 pt-8">
      <div id="level-content"></div>
    </div>
  </div>


  <!-- Delete confirmation modal -->
  <div id="confirm-overlay" style="display:none">
    <div id="confirm-box">
      <h3>Delete entry?</h3>
      <p>This can't be undone.</p>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button id="confirm-cancel" class="delete-btn" style="font-size:0.82rem;">Cancel</button>
        <button id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>


  <script>
    // =========================================================================
    // DOM REFERENCES
    // =========================================================================

    const beanNameInput  = document.getElementById("bean-name");
    const roastDateInput = document.getElementById("roast-date");
    const grindInput     = document.getElementById("grind-size");
    const doseInput      = document.getElementById("dose");
    const yieldInput     = document.getElementById("yield-g");
    const brewTimeInput  = document.getElementById("brew-time");
    const scoreInput     = document.getElementById("taste-score");
    const scoreDisplay   = document.getElementById("score-display");
    const notesInput     = document.getElementById("notes");
    const errorMsg       = document.getElementById("error-msg");
    const entryList      = document.getElementById("entry-list");
    const entryCount     = document.getElementById("entry-count");

    const ratioValue = document.getElementById("ratio-value");
    const timeCard   = document.getElementById("time-card");
    const timeValue  = document.getElementById("time-value");
    const timeStatus = document.getElementById("time-status");


    // =========================================================================
    // PENDING DATE (log a shot for a past calendar date)
    // =========================================================================

    var pendingLogDate = null;

    function setPendingDate(dateStr) {
      pendingLogDate = dateStr;
      document.getElementById('pending-date-label').textContent = 'Adding shot for ' + dateStr;
      document.getElementById('pending-date-banner').style.display = 'flex';
    }

    function clearPendingDate() {
      pendingLogDate = null;
      document.getElementById('pending-date-banner').style.display = 'none';
    }


    // =========================================================================
    // DATA HELPERS
    // =========================================================================

    function loadEntries() {
      const stored = localStorage.getItem("espressoEntries");
      return stored ? JSON.parse(stored) : [];
    }

    function saveEntries(entries) {
      localStorage.setItem("espressoEntries", JSON.stringify(entries));
    }


    // =========================================================================
    // CALCULATIONS
    // =========================================================================

    function calcBrewRatio(dose, yieldG) {
      if (!dose || !yieldG || dose === 0) return null;
      return (yieldG / dose).toFixed(1);
    }

    function getBrewTimeStatus(seconds) {
      if (seconds < 20)  return { label: "Warning",  cls: "s-warning",   suggestion: "Grind finer or increase dose"      };
      if (seconds <= 24) return { label: "Okay",      cls: "s-okay",      suggestion: "Try grinding slightly finer"      };
      if (seconds <= 32) return { label: "Good",      cls: "s-good",      suggestion: "On track, small adjustments only" };
      if (seconds <= 35) return { label: "Excellent", cls: "s-excellent", suggestion: "No changes needed"                };
      return               { label: "Warning",  cls: "s-warning",   suggestion: "Grind coarser or reduce dose"    };
    }


    // =========================================================================
    // LIVE STATS UPDATE
    // =========================================================================

    function updateStats() {
      const dose     = parseFloat(doseInput.value);
      const yieldG   = parseFloat(yieldInput.value);
      const brewTime = parseInt(brewTimeInput.value, 10);

      const ratio = calcBrewRatio(dose, yieldG);
      ratioValue.textContent = ratio ? "1:" + ratio : "--";

      // Reset to neutral — JS sets className directly so .stat-card CSS must
      // carry all visual properties (no Tailwind classes on this element).
      timeCard.className = "stat-card";

      if (brewTime > 0) {
        const { label, cls } = getBrewTimeStatus(brewTime);
        timeValue.textContent  = brewTime + "s";
        timeStatus.textContent = label;
        timeCard.classList.add(cls);
      } else {
        timeValue.textContent  = "--";
        timeStatus.textContent = "--";
      }
    }

    [doseInput, yieldInput, brewTimeInput].forEach(function (input) {
      input.addEventListener("input", updateStats);
    });


    // =========================================================================
    // SLIDER FILL
    // =========================================================================

    function updateSliderFill() {
      const pct     = ((scoreInput.value - 1) / 9) * 100;
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const fill    = isLight ? '#6f4e37' : '#7c3aed';
      const track   = isLight ? '#e8d5c0' : '#2a2550';
      scoreInput.style.background =
        "linear-gradient(to right, " + fill + " " + pct + "%, " + track + " " + pct + "%)";
    }

    scoreInput.addEventListener("input", function () {
      scoreDisplay.textContent = this.value;
      updateSliderFill();
    });


    // =========================================================================
    // ADD ENTRY
    // =========================================================================

    function addEntry() {
      const beanName  = beanNameInput.value.trim();
      const roastDate = roastDateInput.value;
      const grind     = parseInt(grindInput.value, 10);
      const dose      = parseFloat(doseInput.value);
      const yieldG    = parseFloat(yieldInput.value);
      const brewTime  = parseInt(brewTimeInput.value, 10);
      const score     = parseInt(scoreInput.value, 10);
      const notes     = notesInput.value.trim();

      if (!beanName) {
        showError("Please enter a bean name.", beanNameInput);
        return;
      }
      if (isNaN(grind) || grind < 0) {
        showError("Please enter a grind size.", grindInput);
        return;
      }
      if (isNaN(dose) || dose <= 0) {
        showError("Please enter a dose in grams.", doseInput);
        return;
      }
      if (isNaN(yieldG) || yieldG <= 0) {
        showError("Please enter a yield in grams.", yieldInput);
        return;
      }
      if (isNaN(brewTime) || brewTime <= 0) {
        showError("Please enter a brew time in seconds.", brewTimeInput);
        return;
      }

      errorMsg.textContent = "";

      const ratio      = calcBrewRatio(dose, yieldG);
      const timeResult = getBrewTimeStatus(brewTime);

      const entry = {
        id:         Date.now(),
        beanName,
        roastDate,
        grind,
        dose,
        yieldG,
        brewTime,
        score,
        notes,
        ratio,
        timeStatus: timeResult.label,
        timeCls:    timeResult.cls,
        timestamp:  pendingLogDate || new Date().toLocaleDateString(),
      };

      const entries = loadEntries();
      entries.unshift(entry);
      saveEntries(entries);
      clearPendingDate();

      renderEntries();
      resetForm();
    }

    function showError(message, inputToFocus) {
      errorMsg.textContent = message;
      if (inputToFocus) inputToFocus.focus();
    }

    function resetForm() {
      const entries = loadEntries();
      const last    = entries[0];

      beanNameInput.value      = last ? last.beanName  : "";
      roastDateInput.value     = last ? last.roastDate : "";
      grindInput.value         = last ? last.grind     : "";
      doseInput.value          = last ? last.dose      : "";
      yieldInput.value         = "";
      brewTimeInput.value      = "";
      scoreInput.value         = "5";
      notesInput.value         = "";
      scoreDisplay.textContent = "5";
      updateSliderFill();
      updateStats();
      beanNameInput.focus();
    }


    // =========================================================================
    // DELETE ENTRY
    // =========================================================================

    function deleteEntry(id) {
      const updated = loadEntries().filter(function (e) {
        return e.id !== id;
      });
      saveEntries(updated);
      renderEntries();
    }


    // =========================================================================
    // XSS PREVENTION
    // =========================================================================

    function escapeHTML(str) {
      if (!str && str !== 0) return "";
      const div = document.createElement("div");
      div.appendChild(document.createTextNode(String(str)));
      return div.innerHTML;
    }


    // =========================================================================
    // RENDER ENTRIES
    // =========================================================================

    function renderEntries() {
      const entries = loadEntries();

      entryCount.textContent = entries.length;
      entryList.innerHTML = "";

      if (entries.length === 0) {
        entryList.innerHTML = '<li class="empty-message">No shots logged yet. Pull your first one above!</li>';
        if (typeof lucide !== 'undefined') lucide.createIcons();
        return;
      }

      entries.forEach(function (entry) {
        const li = document.createElement("li");

        const roastLine = entry.roastDate
          ? '<div class="entry-meta">Roasted ' + escapeHTML(entry.roastDate) + "</div>"
          : "";

        const notesLine = entry.notes
          ? '<div class="entry-notes">' + escapeHTML(entry.notes) + "</div>"
          : "";

        li.innerHTML = `
          <div class="entry-card">

            <div class="entry-header">
              <div>
                <div class="entry-bean-name">${escapeHTML(entry.beanName)}</div>
                ${roastLine}
                <div class="entry-meta">Logged ${escapeHTML(entry.timestamp)}</div>
              </div>
              <button class="delete-btn" data-id="${entry.id}">
                <i data-lucide="trash-2" style="width:13px;height:13px;flex-shrink:0"></i>
                Delete
              </button>
            </div>

            <div class="entry-stats-grid">
              <div class="entry-stat">
                <div class="entry-stat-label">Grind</div>
                <div class="entry-stat-value">${escapeHTML(entry.grind)}</div>
              </div>
              <div class="entry-stat">
                <div class="entry-stat-label">Dose</div>
                <div class="entry-stat-value">${escapeHTML(entry.dose)}g</div>
              </div>
              <div class="entry-stat">
                <div class="entry-stat-label">Yield</div>
                <div class="entry-stat-value">${escapeHTML(entry.yieldG)}g</div>
              </div>
              <div class="entry-stat">
                <div class="entry-stat-label">Brew Time</div>
                <div class="entry-stat-value">${escapeHTML(entry.brewTime)}s</div>
              </div>
              <div class="entry-stat">
                <div class="entry-stat-label">Ratio</div>
                <div class="entry-stat-value">1:${escapeHTML(entry.ratio)}</div>
              </div>
              <div class="entry-stat status-cell ${escapeHTML(entry.timeCls)}">
                <div class="entry-stat-label">Status</div>
                <div class="entry-stat-value">${escapeHTML(entry.timeStatus)}</div>
              </div>
              <div class="entry-stat">
                <div class="entry-stat-label">Score</div>
                <div class="entry-stat-value">${escapeHTML(entry.score)}/10</div>
              </div>
            </div>

            ${notesLine}

          </div>
        `;

        li.querySelector(".delete-btn").addEventListener("click", function () {
          showDeleteConfirm(entry.id);
        });

        entryList.appendChild(li);
      });

      renderFeedback();
      renderLevel();

      // Render Lucide icons injected into the dynamic HTML above
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }


    // =========================================================================
    // FEEDBACK
    // =========================================================================

    function renderFeedback() {
      const entries = loadEntries();
      const section = document.getElementById("feedback-section");
      const content = document.getElementById("feedback-content");

      if (entries.length === 0) {
        section.style.display = "none";
        return;
      }

      section.style.display = "";
      const e = entries[0];

      const timeResult    = getBrewTimeStatus(e.brewTime);
      const timeExcellent = timeResult.cls === "s-excellent";

      const ratioNum = parseFloat(e.ratio);
      let ratioExcellent  = false;
      let ratioCls        = "";
      let ratioLabel      = "--";
      let ratioSuggestion = "";
      if (!isNaN(ratioNum)) {
        if (ratioNum < 2) {
          ratioCls        = "s-warning";
          ratioLabel      = "Short";
          ratioSuggestion = "Let the shot run longer or reduce dose";
        } else if (ratioNum <= 2.5) {
          ratioCls        = "s-excellent";
          ratioLabel      = "Excellent";
          ratioExcellent  = true;
          ratioSuggestion = "No changes needed";
        } else {
          ratioCls        = "s-warning";
          ratioLabel      = "Long";
          ratioSuggestion = "Stop the shot earlier or increase dose";
        }
      }

      const score = e.score;
      let scoreExcellent  = false;
      let scoreCls        = "";
      let scoreLabel      = "";
      let scoreSuggestion = "";
      if (score >= 8) {
        scoreExcellent  = true;
        scoreCls        = "s-excellent";
        scoreLabel      = "Excellent";
        scoreSuggestion = "No changes needed";
      } else if (score >= 5) {
        scoreCls        = "s-okay";
        scoreLabel      = "Okay";
        scoreSuggestion = "Minor adjustment — try one grind click finer or coarser depending on whether the shot tastes sour or bitter";
      } else {
        scoreCls        = "s-warning";
        scoreLabel      = "Warning";
        scoreSuggestion = "Large adjustment needed — try changing grind size by 2+ clicks";
      }

      if (timeExcellent && ratioExcellent && scoreExcellent) {
        content.innerHTML = '<p class="feedback-perfect">Perfect shot — repeat exactly and see if it holds.</p>';
        return;
      }

      content.innerHTML = `
        <div class="feedback-grid">
          <div class="feedback-col-header">Your Shot</div>
          <div class="feedback-col-header">Ideal Range</div>

          <div class="feedback-cell">
            <div class="feedback-metric-label">Brew Time</div>
            <span class="feedback-actual-value">${escapeHTML(e.brewTime)}s</span><span class="status-pill ${escapeHTML(timeResult.cls)}">${escapeHTML(timeResult.label)}</span>
            <div class="feedback-suggestion">${escapeHTML(timeResult.suggestion)}</div>
          </div>
          <div class="feedback-target">
            <div class="feedback-target-label">Excellent</div>
            <div class="feedback-target-value">33–35s</div>
          </div>

          <div class="feedback-cell">
            <div class="feedback-metric-label">Brew Ratio</div>
            <span class="feedback-actual-value">1:${escapeHTML(e.ratio || "--")}</span><span class="status-pill ${escapeHTML(ratioCls)}">${escapeHTML(ratioLabel)}</span>
            <div class="feedback-suggestion">${escapeHTML(ratioSuggestion)}</div>
          </div>
          <div class="feedback-target">
            <div class="feedback-target-label">Excellent</div>
            <div class="feedback-target-value">1:2 – 1:2.5</div>
          </div>

          <div class="feedback-cell">
            <div class="feedback-metric-label">Taste Score</div>
            <span class="feedback-actual-value">${escapeHTML(score)}/10</span><span class="status-pill ${escapeHTML(scoreCls)}">${escapeHTML(scoreLabel)}</span>
            <div class="feedback-suggestion">${escapeHTML(scoreSuggestion)}</div>
          </div>
          <div class="feedback-target">
            <div class="feedback-target-label">Excellent</div>
            <div class="feedback-target-value">8–10</div>
          </div>
        </div>
      `;
    }


    // =========================================================================
    // EVENT WIRING
    // =========================================================================

    document.getElementById("add-btn").addEventListener("click", addEntry);
    document.getElementById("pending-date-cancel").addEventListener("click", clearPendingDate);

    beanNameInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") addEntry();
    });


    // =========================================================================
    // LEVEL SYSTEM
    // =========================================================================

    var RANKS = [
      { name: 'Green Bean',          min: 0    },
      { name: 'Home Brewer',         min: 100  },
      { name: 'Espresso Enthusiast', min: 300  },
      { name: 'Roaster',             min: 600  },
      { name: 'Barista',             min: 1000 },
      { name: 'Master Dialer',       min: 1500 },
    ];

    var BADGES = [
      { id: 'first_shot',   name: 'First Pull',      icon: 'coffee',      desc: 'Log your first shot'                     },
      { id: 'shots_10',     name: 'Getting Serious',  icon: 'trending-up', desc: 'Log 10 shots'                            },
      { id: 'shots_25',     name: 'Dedicated Dialer', icon: 'target',      desc: 'Log 25 shots'                            },
      { id: 'shots_50',     name: 'Shot Connoisseur', icon: 'trophy',      desc: 'Log 50 shots'                            },
      { id: 'perfect_shot', name: 'Perfectionist',    icon: 'award',       desc: 'Excellent time + ratio + taste score 8+' },
      { id: 'dialed_in',    name: 'Dialed In',        icon: 'zap',         desc: '3 Excellent brew times in a row'         },
      { id: 'bean_5',       name: 'Bean Collector',   icon: 'package',     desc: 'Try 5 different beans'                   },
      { id: 'bean_10',      name: 'World Explorer',   icon: 'globe',       desc: 'Try 10 different beans'                  },
      { id: 'streak_7',     name: 'Week Warrior',     icon: 'flame',       desc: '7-day logging streak'                    },
      { id: 'streak_30',    name: 'Monthly Master',   icon: 'star',        desc: '30-day logging streak'                   },
    ];

    function entryTimeExcellent(e)  { return getBrewTimeStatus(e.brewTime).cls === 's-excellent'; }
    function entryRatioExcellent(e) { var r = parseFloat(e.ratio); return !isNaN(r) && r >= 2 && r <= 2.5; }

    function calcXP(entries) {
      var total = 0;
      entries.forEach(function(e) {
        total += 10;
        var tEx = entryTimeExcellent(e);
        var rEx = entryRatioExcellent(e);
        if (tEx)             total += 5;
        if (rEx)             total += 5;
        if (e.score >= 8)    total += 5;
        if (e.score === 10)  total += 3;
        if (tEx && rEx && e.score >= 8) total += 10;
      });
      return total;
    }

    function getRankInfo(xp) {
      var current = RANKS[0], nextIdx = 1;
      for (var i = 0; i < RANKS.length; i++) {
        if (xp >= RANKS[i].min) { current = RANKS[i]; nextIdx = i + 1; }
      }
      var next = nextIdx < RANKS.length ? RANKS[nextIdx] : null;
      var pct  = next
        ? Math.min(100, Math.round(((xp - current.min) / (next.min - current.min)) * 100))
        : 100;
      return { current: current, next: next, pct: pct };
    }

    function calcStreaks(entries) {
      if (!entries.length) return { current: 0, best: 0 };
      var seen = {};
      entries.forEach(function(e) { seen[e.timestamp] = true; });
      var dates = Object.keys(seen).sort(function(a, b) { return new Date(a) - new Date(b); });
      var best = 1, streak = 1;
      for (var i = 1; i < dates.length; i++) {
        var diff = Math.round((new Date(dates[i]) - new Date(dates[i - 1])) / 86400000);
        if (diff === 1) { streak++; best = Math.max(best, streak); }
        else if (diff > 1) { streak = 1; }
      }
      best = Math.max(best, streak);
      var today = new Date(); today.setHours(0,0,0,0);
      var last  = new Date(dates[dates.length - 1]); last.setHours(0,0,0,0);
      var current = 0;
      if (Math.round((today - last) / 86400000) <= 1) {
        current = 1;
        for (var j = dates.length - 1; j > 0; j--) {
          if (Math.round((new Date(dates[j]) - new Date(dates[j-1])) / 86400000) === 1) current++;
          else break;
        }
      }
      return { current: current, best: best };
    }

    function calcSnapshot(entries) {
      if (!entries.length) return { avgScore: null, excellentPct: 0, uniqueBeans: 0 };
      var last30   = entries.slice(0, 30);
      var avg      = last30.reduce(function(s, e) { return s + e.score; }, 0) / last30.length;
      var exCount  = entries.filter(entryTimeExcellent).length;
      var beans    = new Set(entries.map(function(e) { return e.beanName.toLowerCase().trim(); })).size;
      return { avgScore: avg.toFixed(1), excellentPct: Math.round((exCount / entries.length) * 100), uniqueBeans: beans };
    }

    function getUnlockedBadges(entries, streaks) {
      var u = {}, asc = entries.slice().reverse(), maxExcRun = 0, run = 0;
      asc.forEach(function(e) {
        if (entryTimeExcellent(e)) { run++; maxExcRun = Math.max(maxExcRun, run); } else { run = 0; }
      });
      var beans = new Set(entries.map(function(e) { return e.beanName.toLowerCase().trim(); })).size;
      u['first_shot']   = entries.length >= 1;
      u['shots_10']     = entries.length >= 10;
      u['shots_25']     = entries.length >= 25;
      u['shots_50']     = entries.length >= 50;
      u['perfect_shot'] = entries.some(function(e) { return entryTimeExcellent(e) && entryRatioExcellent(e) && e.score >= 8; });
      u['dialed_in']    = maxExcRun >= 3;
      u['bean_5']       = beans >= 5;
      u['bean_10']      = beans >= 10;
      u['streak_7']     = streaks.best >= 7;
      u['streak_30']    = streaks.best >= 30;
      return u;
    }

    function statCard(label, value, sub) {
      return '<div class="stat-card">'
        + '<div class="text-[0.68rem] font-semibold uppercase tracking-widest text-[#9b8ec4] mb-2">' + escapeHTML(label) + '</div>'
        + '<div class="stat-card-value text-[2rem] font-bold text-[#e2e0f0] leading-none mb-1">' + escapeHTML(String(value)) + '</div>'
        + '<div class="text-xs text-[#9b8ec4]">' + escapeHTML(sub) + '</div>'
        + '</div>';
    }

    function renderLevel() {
      var entries  = loadEntries();
      var xp       = calcXP(entries);
      var rankInfo = getRankInfo(xp);
      var streaks  = calcStreaks(entries);
      var snap     = calcSnapshot(entries);
      var unlocked = getUnlockedBadges(entries, streaks);

      var xpLabel   = rankInfo.next ? xp + ' / ' + rankInfo.next.min + ' XP' : xp + ' XP';
      var nextLabel = rankInfo.next
        ? 'Next: ' + rankInfo.next.name + ' — ' + (rankInfo.next.min - xp) + ' XP to go'
        : 'Maximum rank reached';

      var html = '';

      html += '<div class="rank-card">'
        + '<div class="rank-title">Current Rank</div>'
        + '<div class="rank-name">' + escapeHTML(rankInfo.current.name) + '</div>'
        + '<div class="rank-xp-label">' + escapeHTML(xpLabel) + '</div>'
        + '<div class="xp-bar-track"><div class="xp-bar-fill" style="width:' + rankInfo.pct + '%"></div></div>'
        + '<div class="rank-next-label">' + escapeHTML(nextLabel) + '</div>'
        + '</div>';

      html += '<div class="grid grid-cols-2 gap-4 mb-5">'
        + statCard('Current Streak', streaks.current, 'days in a row')
        + statCard('Best Streak',    streaks.best,    'days')
        + '</div>';

      html += '<div class="grid grid-cols-3 gap-4 mb-6">'
        + statCard('Avg Score',    entries.length ? snap.avgScore            : '--', 'last 30 shots')
        + statCard('Excellent %',  entries.length ? snap.excellentPct + '%'  : '--', 'brew time')
        + statCard('Unique Beans', snap.uniqueBeans, 'tried so far')
        + '</div>';

      html += '<div class="badges-section-title"><i data-lucide="award" style="width:18px;height:18px;"></i>Badges</div>';
      html += '<div class="badges-grid">';
      BADGES.forEach(function(b) {
        var cls = unlocked[b.id] ? 'badge-unlocked' : 'badge-locked';
        html += '<div class="badge-card ' + cls + '">'
          + '<div class="badge-icon"><i data-lucide="' + b.icon + '" style="width:26px;height:26px;"></i></div>'
          + '<div class="badge-name">' + escapeHTML(b.name) + '</div>'
          + '<div class="badge-desc">'  + escapeHTML(b.desc) + '</div>'
          + '</div>';
      });
      html += '</div>';

      document.getElementById('level-content').innerHTML = html;
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }


    // =========================================================================
    // INITIALIZATION
    // =========================================================================

    updateSliderFill();
    updateStats();
    renderEntries();  // also calls lucide.createIcons() for dynamic icons

    // Initialize Lucide icons in static HTML (header, form headings, add button)
    if (typeof lucide !== 'undefined') lucide.createIcons();


    // =========================================================================
    // DELETE CONFIRMATION
    // =========================================================================

    var pendingDeleteId = null;

    function showDeleteConfirm(id) {
      pendingDeleteId = id;
      document.getElementById('confirm-overlay').style.display = 'flex';
    }

    function hideDeleteConfirm() {
      pendingDeleteId = null;
      document.getElementById('confirm-overlay').style.display = 'none';
    }

    document.getElementById('confirm-cancel').addEventListener('click', hideDeleteConfirm);

    document.getElementById('confirm-delete-btn').addEventListener('click', function () {
      if (pendingDeleteId !== null) {
        deleteEntry(pendingDeleteId);
        hideDeleteConfirm();
      }
    });

    document.getElementById('confirm-overlay').addEventListener('click', function (e) {
      if (e.target === this) hideDeleteConfirm();
    });


    // =========================================================================
    // CALENDAR
    // =========================================================================

    var calYear  = new Date().getFullYear();
    var calMonth = new Date().getMonth();

    var CAL_MONTHS = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];

    function brewQualityClass(brewTime) {
      return 'brew-' + getBrewTimeStatus(brewTime).cls.slice(2);
    }

    function renderCalendar() {
      var entries = loadEntries();

      // Map timestamp → [entries] (timestamp uses toLocaleDateString, same as entry.timestamp)
      var entryMap = {};
      entries.forEach(function (e) {
        if (!entryMap[e.timestamp]) entryMap[e.timestamp] = [];
        entryMap[e.timestamp].push(e);
      });

      document.getElementById('cal-month-label').textContent =
        CAL_MONTHS[calMonth] + ' ' + calYear;

      var firstDow     = new Date(calYear, calMonth, 1).getDay();
      var daysInMonth  = new Date(calYear, calMonth + 1, 0).getDate();
      var today        = new Date();
      var html         = '';

      for (var i = 0; i < firstDow; i++) {
        html += '<div class="cal-day cal-empty"></div>';
      }

      for (var d = 1; d <= daysInMonth; d++) {
        var dateStr     = new Date(calYear, calMonth, d).toLocaleDateString();
        var dayEntries  = entryMap[dateStr] || [];
        var isToday     = calYear  === today.getFullYear() &&
                          calMonth === today.getMonth()    &&
                          d        === today.getDate();

        var cls = 'cal-day';
        var dataAttr = 'data-date="' + dateStr + '"';

        if (dayEntries.length > 0) {
          cls += ' cal-has-brew ' + brewQualityClass(dayEntries[0].brewTime);
        }
        if (isToday) cls += ' cal-today';

        html += '<div class="' + cls + '" ' + dataAttr + '>' + d + '</div>';
      }

      document.getElementById('cal-grid').innerHTML = html;

      document.querySelectorAll('.cal-day:not(.cal-empty)').forEach(function (cell) {
        cell.addEventListener('click', function () {
          var ds = this.dataset.date;
          showCalPopup(ds, entryMap[ds] || []);
        });
      });
    }

    function showCalPopup(dateStr, entries) {
      document.getElementById('cal-popup-title').textContent = dateStr;

      var html = '';

      if (entries.length === 0) {
        html += '<p class="empty-message" style="padding:20px 0 16px;">No shots logged for this day.</p>';
      } else {
        entries.forEach(function (e) {
          var tr     = getBrewTimeStatus(e.brewTime);
          var ratio  = e.ratio ? '1:' + escapeHTML(String(e.ratio)) : '--';
          var roastLine = e.roastDate
            ? '<div class="entry-meta">Roasted ' + escapeHTML(e.roastDate) + '</div>' : '';
          var notesLine = e.notes
            ? '<div class="entry-notes">' + escapeHTML(e.notes) + '</div>' : '';

          html += '<div class="entry-card">'
            + '<div class="entry-header">'
            +   '<div>'
            +     '<div class="entry-bean-name">' + escapeHTML(e.beanName) + '</div>'
            +     roastLine
            +   '</div>'
            +   '<span class="status-pill ' + escapeHTML(tr.cls) + '">' + escapeHTML(tr.label) + '</span>'
            + '</div>'
            + '<div class="entry-stats-grid">'
            +   '<div class="entry-stat"><div class="entry-stat-label">Grind</div><div class="entry-stat-value">' + escapeHTML(String(e.grind)) + '</div></div>'
            +   '<div class="entry-stat"><div class="entry-stat-label">Dose</div><div class="entry-stat-value">' + escapeHTML(String(e.dose)) + 'g</div></div>'
            +   '<div class="entry-stat"><div class="entry-stat-label">Yield</div><div class="entry-stat-value">' + escapeHTML(String(e.yieldG)) + 'g</div></div>'
            +   '<div class="entry-stat"><div class="entry-stat-label">Brew Time</div><div class="entry-stat-value">' + escapeHTML(String(e.brewTime)) + 's</div></div>'
            +   '<div class="entry-stat"><div class="entry-stat-label">Ratio</div><div class="entry-stat-value">' + ratio + '</div></div>'
            +   '<div class="entry-stat"><div class="entry-stat-label">Score</div><div class="entry-stat-value">' + escapeHTML(String(e.score)) + '/10</div></div>'
            + '</div>'
            + notesLine
            + '</div>';
        });
      }

      html += '<button id="cal-add-shot-btn" class="btn-add" style="margin-top:12px;">'
        + '<i data-lucide="plus" style="width:16px;height:16px;"></i>'
        + 'Add Shot for this Day'
        + '</button>';

      document.getElementById('cal-popup-entries').innerHTML = html;
      document.getElementById('cal-popup-overlay').style.display = 'flex';
      if (typeof lucide !== 'undefined') lucide.createIcons();

      document.getElementById('cal-add-shot-btn').addEventListener('click', function () {
        hideCalPopup();
        setPendingDate(dateStr);
        document.querySelector('.nav-tab[data-page="home"]').click();
      });
    }

    function hideCalPopup() {
      document.getElementById('cal-popup-overlay').style.display = 'none';
    }

    document.getElementById('cal-prev').addEventListener('click', function () {
      calMonth--;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    });

    document.getElementById('cal-next').addEventListener('click', function () {
      calMonth++;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    });

    document.getElementById('cal-today').addEventListener('click', function () {
      var now = new Date();
      calYear  = now.getFullYear();
      calMonth = now.getMonth();
      renderCalendar();
    });

    document.getElementById('cal-popup-close').addEventListener('click', hideCalPopup);

    document.getElementById('cal-popup-overlay').addEventListener('click', function (e) {
      if (e.target === this) hideCalPopup();
    });


    // =========================================================================
    // NAV TAB SWITCHING
    // =========================================================================

    document.querySelectorAll('.nav-tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        const page = this.dataset.page;

        document.querySelectorAll('.nav-tab').forEach(function (t) {
          t.classList.remove('active');
        });
        this.classList.add('active');

        document.querySelectorAll('.page-content').forEach(function (p) {
          p.style.display = 'none';
        });
        document.getElementById('page-' + page).style.display = '';

        if (page === 'calendar') renderCalendar();
        if (page === 'level')    renderLevel();
        if (typeof lucide !== 'undefined') lucide.createIcons();
      });
    });


    // =========================================================================
    // THEME TOGGLE
    // =========================================================================

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('coffeeTheme', theme);
      var icon = document.getElementById('theme-icon');
      icon.setAttribute('data-lucide', theme === 'light' ? 'moon' : 'sun');
      if (typeof lucide !== 'undefined') lucide.createIcons();
      updateSliderFill();
    }

    document.getElementById('theme-toggle').addEventListener('click', function () {
      var current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'light' ? 'night' : 'light');
    });

    // Restore saved preference
    var savedTheme = localStorage.getItem('coffeeTheme');
    if (savedTheme) applyTheme(savedTheme);

  </script>
</body>
</html>
